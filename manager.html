<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Espace Manager — Congés Équipe</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/form.css" />
</head>
<body>

<!-- ═══════════════ LOGIN WALL ═══════════════ -->
<div id="login-wall">
  <div class="login-card">
    <div class="login-icon">🔒</div>
    <h2>Accès réservé aux managers</h2>
    <p>Vous devez être manager pour accéder à cette page.</p>
    <a href="index.html" class="btn">← Retour</a>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app" style="display:none">
<div class="container">

  <div class="page-header">
    <div>
      <h1>Espace Manager</h1>
      <div class="subtitle">Validation des demandes de congés</div>
    </div>
    <div style="display:flex;align-items:center;gap:.75rem">
      <div class="user-badge">
        <span id="user-avatar-header"></span>
        <span id="user-name-header"></span>
      </div>
      <a id="employee-link" href="index.html" class="btn">← Vue employé</a>
    </div>
  </div>

  <div id="firebase-banner" class="firebase-banner" style="display:none">
    <strong>Configuration Firebase requise</strong>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('pending')">En attente <span id="badge-pending"></span></button>
    <button class="tab" onclick="switchTab('all')">Toutes les demandes</button>
    <button class="tab" onclick="switchTab('calendrier')">Calendrier équipe</button>
    <button class="tab" onclick="switchTab('saisie')">Saisir pour un employé</button>
  </div>

  <!-- ═══ EN ATTENTE ═══ -->
  <div id="tab-pending" class="section active">
    <div class="card">
      <div id="pending-list"><div class="loading-state"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- ═══ TOUTES ═══ -->
  <div id="tab-all" class="section">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="card">
      <div id="all-list"><div class="loading-state"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- ═══ CALENDRIER ═══ -->
  <div id="tab-calendrier" class="section">
    <div class="card card-sm">
      <div class="cal-header">
        <div class="cal-nav">
          <button class="btn" onclick="cal.prevMonth()">‹</button>
          <button class="btn" onclick="cal.nextMonth()">›</button>
        </div>
        <div class="cal-title" id="cal-title"></div>
        <button class="btn" onclick="cal.goToday()">Aujourd'hui</button>
      </div>
      <div id="cal-legend" class="cal-legend"></div>
      <div class="cal-grid" id="cal-grid">
        <div class="cal-day-name">Lun</div>
        <div class="cal-day-name">Mar</div>
        <div class="cal-day-name">Mer</div>
        <div class="cal-day-name">Jeu</div>
        <div class="cal-day-name">Ven</div>
        <div class="cal-day-name">Sam</div>
        <div class="cal-day-name">Dim</div>
      </div>
    </div>
  </div>

  <!-- ═══ SAISIE POUR UN EMPLOYÉ ═══ -->
  <div id="tab-saisie" class="section">
    <div class="card">

      <!-- Sélecteur employé -->
      <div class="field">
        <label>Employé *</label>
        <select id="m-employee" onchange="onEmployeeSelect()">
          <option value="">— Choisir un employé —</option>
        </select>
      </div>

      <!-- Formulaire (masqué tant qu'aucun employé n'est choisi) -->
      <div id="m-form" style="display:none">

        <div class="date-periode-row">
          <div class="field field-date">
            <label>Date de début *</label>
            <input type="date" id="m-debut" onchange="ManagerForm.onDebutChange()" />
          </div>
          <div class="field-periode" id="m-toggle-debut">
            <div class="periode-wrap-container">
              <div class="periode-wrap">
                <button class="pbtn on" id="m-btn-debut-matin"  onclick="ManagerForm.toggleDebut('Matin')">Matin</button>
                <button class="pbtn on" id="m-btn-debut-apmidi" onclick="ManagerForm.toggleDebut('Après-midi')">Après-midi</button>
              </div>
              <div class="periode-error" id="m-hint-debut"></div>
            </div>
          </div>
          <input type="hidden" id="m-periode-debut" value="Journée" />
        </div>

        <div id="m-fin-section" style="display:none">
          <div class="date-periode-row">
            <div class="field field-date">
              <label>Date de fin <span style="color:var(--text3);font-weight:400">(optionnelle)</span></label>
              <input type="date" id="m-fin" onchange="ManagerForm.onFinChange()" />
            </div>
            <div class="field-periode" id="m-toggle-fin">
              <div class="periode-wrap-container">
                <div class="periode-wrap">
                  <button class="pbtn on" id="m-btn-fin-matin"  onclick="ManagerForm.toggleFin('Matin')">Matin</button>
                  <button class="pbtn on" id="m-btn-fin-apmidi" onclick="ManagerForm.toggleFin('Après-midi')">Après-midi</button>
                </div>
                <div class="periode-error" id="m-hint-fin"></div>
              </div>
            </div>
            <input type="hidden" id="m-periode-fin" value="Journée" />
          </div>
        </div>

        <div id="m-preview-days" style="display:none;margin-bottom:.75rem;padding:.6rem 1rem;background:var(--bg2);border-radius:var(--radius);font-size:13px;color:var(--text2)"></div>

        <div class="field">
          <label>Type de congé *</label>
          <select id="m-type"></select>
        </div>
        <div class="field">
          <label>Note (optionnelle)</label>
          <textarea id="m-note" rows="2" placeholder="Informations complémentaires..."></textarea>
        </div>

        <div class="btn-row">
          <button class="btn primary" id="m-btn-submit" onclick="handleManagerSubmit()">Enregistrer le congé</button>
        </div>

      </div>
    </div>
  </div>

</div>
</div>

<!-- Modal refus -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center">
  <div style="background:var(--bg);border-radius:var(--radius-lg);padding:1.5rem;width:min(420px,92vw)">
    <div style="font-size:16px;font-weight:500;margin-bottom:1rem">Motif du refus</div>
    <div class="field">
      <label>Commentaire (optionnel)</label>
      <textarea id="reject-comment" rows="3" placeholder="Expliquez le motif du refus..."></textarea>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn danger" onclick="confirmReject()">Confirmer le refus</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="config/employees.js"></script>
<script src="config/leaveTypes.js"></script>
<script src="js/firebase.js"></script>
<script src="js/users.js"></script>
<script src="js/calendar.js"></script>
<script src="js/leaves.js"></script>
<script src="js/form.js"></script>
<script src="js/manager.js"></script>

</body>
</html>
