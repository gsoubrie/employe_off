<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Congés Équipe</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/form.css" />
</head>
<body>

<!-- ═══════════════ LOGIN WALL ═══════════════ -->
<div id="login-wall">
  <div class="login-card">
    <div class="login-icon">🔒</div>
    <h2>Accès non autorisé</h2>
    <p>Ce lien est invalide ou expiré.<br>Contactez un manager pour recevoir votre lien personnel.</p>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app" style="display:none">
<div class="container">

  <div class="page-header">
    <div>
      <h1>Congés Équipe</h1>
      <div class="subtitle">Saisie et suivi des absences</div>
    </div>
    <div style="display:flex;align-items:center;gap:.75rem">
      <div class="user-badge">
        <span id="user-avatar-header"></span>
        <span id="user-name-header"></span>
      </div>
      <a id="manager-link" href="manager.html" class="btn" style="display:none">Vue manager →</a>
    </div>
  </div>

  <div id="firebase-banner" class="firebase-banner" style="display:none">
    <strong>Configuration Firebase requise</strong>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('saisie')">Saisie</button>
    <button class="tab" onclick="switchTab('calendrier')">Calendrier</button>
    <button class="tab" onclick="switchTab('liste')">Mes congés</button>
  </div>

  <!-- ═══ SAISIE ═══ -->
  <div id="tab-saisie" class="section active">
    <div class="card">

      <div class="field">
        <label>Employé</label>
        <div id="f-employee-display" style="padding:.55rem .75rem;background:var(--bg2);border-radius:var(--radius);font-weight:500"></div>
        <input type="hidden" id="f-employee" />
      </div>

      <div class="date-periode-row">
        <div class="field field-date">
          <label>Date de début *</label>
          <input type="date" id="f-debut" onchange="PeriodeForm.onDebutChange()" />
        </div>
        <div class="field-periode" id="toggle-debut">
          <label>Période début</label>
          <div class="periode-wrap">
            <button class="pbtn on" id="btn-debut-matin"  onclick="PeriodeForm.toggleDebut('Matin')">Matin</button>
            <button class="pbtn on" id="btn-debut-apmidi" onclick="PeriodeForm.toggleDebut('Après-midi')">Après-midi</button>
          </div>
          <div class="periode-error" id="hint-debut"></div>
        </div>
        <input type="hidden" id="f-periode-debut" value="Journée" />
      </div>

      <div id="fin-section" style="display:none">
        <div class="date-periode-row">
          <div class="field field-date">
            <label>Date de fin <span style="color:var(--text3);font-weight:400">(optionnelle)</span></label>
            <input type="date" id="f-fin" onchange="PeriodeForm.onFinChange()" />
          </div>
          <div class="field-periode" id="toggle-fin">
            <label>Période fin</label>
            <div class="periode-wrap">
              <button class="pbtn on" id="btn-fin-matin"  onclick="PeriodeForm.toggleFin('Matin')">Matin</button>
              <button class="pbtn on" id="btn-fin-apmidi" onclick="PeriodeForm.toggleFin('Après-midi')">Après-midi</button>
            </div>
            <div class="periode-error" id="hint-fin"></div>
          </div>
          <input type="hidden" id="f-periode-fin" value="Journée" />
        </div>
      </div>

      <div id="preview-days" style="display:none;margin-bottom:.75rem;padding:.6rem 1rem;background:var(--bg2);border-radius:var(--radius);font-size:13px;color:var(--text2)"></div>

      <div class="field">
        <label>Type de congé *</label>
        <select id="f-type"></select>
      </div>
      <div class="field">
        <label>Note (optionnelle)</label>
        <textarea id="f-note" rows="2" placeholder="Informations complémentaires..."></textarea>
      </div>
      <div class="btn-row">
        <button class="btn primary" id="btn-submit" onclick="handleSubmit()">Soumettre la demande</button>
      </div>

    </div>
  </div>

  <!-- ═══ CALENDRIER ═══ -->
  <div id="tab-calendrier" class="section">
    <div class="card card-sm">
      <div class="cal-header">
        <div class="cal-nav">
          <button class="btn" onclick="cal.prevMonth()">‹</button>
          <button class="btn" onclick="cal.nextMonth()">›</button>
        </div>
        <div class="cal-title" id="cal-title"></div>
        <button class="btn" onclick="cal.goToday()">Aujourd'hui</button>
      </div>
      <div id="cal-legend" class="cal-legend"></div>
      <div class="cal-grid" id="cal-grid">
        <div class="cal-day-name">Lun</div>
        <div class="cal-day-name">Mar</div>
        <div class="cal-day-name">Mer</div>
        <div class="cal-day-name">Jeu</div>
        <div class="cal-day-name">Ven</div>
        <div class="cal-day-name">Sam</div>
        <div class="cal-day-name">Dim</div>
      </div>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-top:.5rem;text-align:center">
      Seuls les congés approuvés apparaissent.
    </p>
  </div>

  <!-- ═══ MES CONGÉS ═══ -->
  <div id="tab-liste" class="section">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="card">
      <div id="leaves-list">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="config/employees.js"></script>
<script src="config/leaveTypes.js"></script>
<script src="js/firebase.js"></script>
<script src="js/users.js"></script>
<script src="js/calendar.js"></script>
<script src="js/leaves.js"></script>
<script src="js/form.js"></script>
<script src="js/app.js"></script>

</body>
</html>
